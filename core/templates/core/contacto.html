{% extends 'layouts/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row">
	<div class="col col-md-4 mx-auto">
		{% include 'includes/alertas.html' %}
		<h1>Contacto</h1>
		<form action="{% url 'contacto' %}" method="POST">
				{% csrf_token %}
				{{ form | crispy }}
				<button type="submit" class="btn btn-primary">Enviar</button>
		</form>
	</div>
</div>
{% endblock %}

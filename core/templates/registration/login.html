{% extends 'layouts/nada.html'%}
{% load crispy_forms_tags %}

{% block content %}
<div class="row">
	<div class="col col-md-4 mx-auto">
		<h1>Login</h1>
		<form action="{% url 'login' %}" method="POST">
				{% csrf_token %}
				{{ form | crispy }}
				<button class="btn btn-primary" type="submit">Entrar</button>
		</form>
	</div>
</div>
{% endblock %}
